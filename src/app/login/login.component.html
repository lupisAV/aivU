<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand-header">
        <h1 class="brand">
          <span class="brand-icon">🤖</span>
          aivU
        </h1>
        <p class="brand-tagline">AI, Vision, yoU.</p>
      </div>
      
      <h2 class="auth-title">Iniciar Sesión</h2>
      <p class="auth-subtitle">Bienvenido de nuevo a tu entrenador personal</p>

      <div class="form-group">
        <label>
          <span class="label-icon">📧</span>
          Email
        </label>
        <input type="email" placeholder="tu@correo.com" />
      </div>

      <div class="form-group">
        <label>
          <span class="label-icon">🔒</span>
          Contraseña
        </label>
        <input type="password" placeholder="••••••••" />
      </div>

      <div class="forgot-password">
        <a>¿Olvidaste tu contraseña?</a>
      </div>

      <button class="btn primary" (click)="goToHome()">
        <span class="btn-icon">🚀</span>
        Ingresar
      </button>

      <div class="divider">
        <span>o</span>
      </div>

      <p class="signup-link">
        ¿No tienes cuenta?
        <a (click)="goToRegister()">Regístrate aquí</a>
      </p>
    </div>

    <div class="auth-illustration">
      <div class="illustration-content">
        <div class="floating-icon icon-1">💪</div>
        <div class="floating-icon icon-2">🎯</div>
        <div class="floating-icon icon-3">⚡</div>
        <div class="illustration-text">
          <h3>Entrena Inteligente</h3>
          <p>Corrección de postura en tiempo real con IA</p>
        </div>
      </div>
    </div>
  </div>
</div>
