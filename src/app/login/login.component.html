<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand-header">
        <h1 class="brand" aria-label="aivU - AI Vision You">
          <span class="brand-icon" aria-hidden="true">🤖</span>
          aivU
        </h1>
        <p class="brand-tagline">AI, Vision, yoU.</p>
      </div>
      
      <h2 class="auth-title">Iniciar Sesión</h2>
      <p class="auth-subtitle">Bienvenido de nuevo a tu entrenador personal</p>

      <form class="auth-form" role="form" aria-label="Formulario de inicio de sesión">
        <div class="form-group">
          <label for="email" aria-required="true">
            <span class="label-icon" aria-hidden="true">📧</span>
            <span class="label-text">Correo Electrónico</span>
          </label>
          <input 
            id="email"
            type="email" 
            placeholder="tu@correo.com" 
            required
            aria-label="Correo electrónico para iniciar sesión"
            aria-describedby="email-help" />
          <span id="email-help" class="helper-text">Ingresa tu correo electrónico registrado</span>
        </div>

        <div class="form-group">
          <label for="password" aria-required="true">
            <span class="label-icon" aria-hidden="true">🔒</span>
            <span class="label-text">Contraseña</span>
          </label>
          <input 
            id="password"
            type="password" 
            placeholder="••••••••" 
            required
            aria-label="Contraseña"
            aria-describedby="password-help" />
          <span id="password-help" class="helper-text">Mínimo 6 caracteres</span>
        </div>

        <div class="forgot-password">
          <a href="#" role="button" aria-label="Recuperar contraseña">¿Olvidaste tu contraseña?</a>
        </div>

        <button 
          type="button"
          class="btn primary" 
          (click)="goToHome()"
          aria-label="Inicia sesión en tu cuenta">
          <span class="btn-icon" aria-hidden="true">🚀</span>
          <span class="btn-text">Ingresar</span>
        </button>
      </form>

      <div class="divider" aria-hidden="true">
        <span>o</span>
      </div>

      <p class="signup-link">
        ¿No tienes cuenta?
        <a role="button" (click)="goToRegister()" aria-label="Ir a crear una nueva cuenta">Regístrate aquí</a>
      </p>
    </div>

    <div class="auth-illustration" aria-hidden="true">
      <div class="illustration-content">
        <div class="floating-icon icon-1">💪</div>
        <div class="floating-icon icon-2">🎯</div>
        <div class="floating-icon icon-3">⚡</div>
        <div class="illustration-text">
          <h3>Entrena Inteligente</h3>
          <p>Corrección de postura en tiempo real con IA</p>
        </div>
      </div>
    </div>
  </div>
</div>
