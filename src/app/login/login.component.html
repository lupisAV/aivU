<div class="auth-page">
  <div class="auth-card">
    <h1 class="brand">AI-Powered Fitness</h1>
    <h2>Iniciar sesión</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="text" placeholder="tu@correo.com" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" />
    </div>

    <button class="btn primary" (click)="goToHome()">Ingresar</button>

    <p class="small">
      ¿No tienes cuenta?
      <a (click)="goToRegister()">Regístrate aquí</a>
    </p>
  </div>

  <div class="auth-illustration">
    <img src="assets/illustration-login.png" alt="AI posture" />
  </div>
</div>
