<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand-header">
        <h1 class="brand">
          <span class="brand-icon">🤖</span>
          aivU
        </h1>
        <p class="brand-tagline">AI, Vision, yoU.</p>
      </div>
      
      <h2 class="auth-title">Crear Cuenta</h2>
      <p class="auth-subtitle">Únete y comienza tu transformación</p>

      <div class="form-group">
        <label>
          <span class="label-icon">👤</span>
          Nombre completo
        </label>
        <input type="text" placeholder="Tu nombre completo" />
      </div>

      <div class="form-group">
        <label>
          <span class="label-icon">📧</span>
          Email
        </label>
        <input type="email" placeholder="tu@correo.com" />
      </div>

      <div class="form-group">
        <label>
          <span class="label-icon">🔒</span>
          Contraseña
        </label>
        <input type="password" placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label>
          <span class="label-icon">✓</span>
          Confirmar contraseña
        </label>
        <input type="password" placeholder="••••••••" />
      </div>

      <button class="btn primary" (click)="goToHome()">
        <span class="btn-icon">✨</span>
        Crear Cuenta
      </button>

      <div class="divider">
        <span>o</span>
      </div>

      <p class="signup-link">
        ¿Ya tienes cuenta?
        <a (click)="goToLogin()">Inicia sesión</a>
      </p>
    </div>

    <div class="auth-illustration">
      <div class="illustration-content">
        <div class="floating-icon icon-1">🎯</div>
        <div class="floating-icon icon-2">💪</div>
        <div class="floating-icon icon-3">🚀</div>
        <div class="illustration-text">
          <h3>Comienza Hoy</h3>
          <p>Tu viaje hacia una mejor postura y salud comienza aquí</p>
        </div>
      </div>
    </div>
  </div>
</div>
