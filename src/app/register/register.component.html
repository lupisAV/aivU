<div class="auth-page">
  <div class="auth-card">
    <h1 class="brand">AI-Powered Fitness</h1>
    <h2>Crea tu cuenta</h2>

    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" placeholder="Tu nombre completo" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="text" placeholder="tu@correo.com" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" placeholder="••••••••" />
    </div>

    <button class="btn primary" (click)="goToHome()">Registrarse</button>

    <p class="small">
      ¿Ya tienes cuenta?
      <a (click)="goToLogin()">Inicia sesión</a>
    </p>
  </div>

  <div class="auth-illustration">
    <img src="assets/illustration-register.png" alt="AI register" />
  </div>
</div>
